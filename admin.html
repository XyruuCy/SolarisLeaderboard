<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: { base: '#06060b', surface: '#0f0e1a', surface2: '#17152b', line: '#262247', violetGlow: '#c0a5ff', lime: '#c6f24e' },
        fontFamily: { body: ['Outfit', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
      }
    }
  }
</script>
</head>
<body class="bg-base text-slate-200 font-body min-h-screen p-6 sm:p-10">

  <div class="max-w-4xl mx-auto">
    <!-- Header Controls -->
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8 pb-6 border-b border-line">
      <div>
        <h1 class="text-2xl font-900 tracking-tight text-white uppercase">COMMAND_CENTER<span class="text-violetGlow">/</span>SEC</h1>
        <p class="text-xs text-slate-400 font-mono uppercase mt-1">Manual Database override & synchronization monitoring</p>
      </div>
      <a href="index.html" class="px-4 py-2 bg-surface2 border border-line hover:border-violetGlow text-xs font-700 uppercase tracking-widest rounded-xl transition-all">← Back to Leaderboard</a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <!-- FORM COLUMN: Add / Edit -->
      <div class="md:col-span-1 bg-surface border border-line rounded-2xl p-5 shadow-xl h-fit">
        <h3 class="text-white font-700 text-sm tracking-wider uppercase mb-4 flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-violetGlow animate-pulse"></span> Deploy / Mod Player
        </h3>
        
        <form id="player-form" class="space-y-4 text-xs font-mono">
          <div>
            <label class="block text-slate-400 uppercase tracking-wider mb-1.5">Minecraft Username *</label>
            <input type="text" id="form-username" required placeholder="e.g. Juszzz" class="w-full bg-base border border-line focus:border-violetGlow rounded-xl px-4 py-3 text-white outline-none font-sans font-700 text-sm" />
          </div>
          <div>
            <label class="block text-slate-400 uppercase tracking-wider mb-1.5">Player UUID (Optional)</label>
            <input type="text" id="form-uuid" placeholder="Auto-generated if blank" class="w-full bg-base border border-line focus:border-violetGlow rounded-xl px-4 py-3 text-white outline-none text-[11px]" />
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-slate-400 uppercase tracking-wider mb-1.5">Total Kills</label>
              <input type="number" id="form-kills" min="0" value="0" class="w-full bg-base border border-line focus:border-violetGlow rounded-xl px-4 py-3 text-lime outline-none font-700 text-sm" />
            </div>
            <div>
              <label class="block text-slate-400 uppercase tracking-wider mb-1.5">Total Deaths</label>
              <input type="number" id="form-deaths" min="0" value="0" class="w-full bg-base border border-line focus:border-violetGlow rounded-xl px-4 py-3 text-red-400 outline-none font-700 text-sm" />
            </div>
          </div>
          <div class="flex items-center gap-3 py-2">
            <input type="checkbox" id="form-online" class="w-4 h-4 rounded border-line bg-base text-violetGlow focus:ring-0 cursor-pointer" />
            <label for="form-online" class="text-slate-300 uppercase tracking-wider cursor-pointer">Set Online Status</label>
          </div>
          <button type="submit" class="w-full py-3 bg-violetGlow text-base font-900 tracking-widest rounded-xl hover:opacity-90 transition-opacity font-sans uppercase">Save Data Block</button>
        </form>
      </div>

      <!-- LIST COLUMN: Current Database State -->
      <div class="md:col-span-2 bg-surface border border-line rounded-2xl p-5 shadow-xl">
        <h3 class="text-white font-700 text-sm tracking-wider uppercase mb-4">Database Inventory</h3>
        
        <div class="overflow-hidden rounded-xl border border-line bg-base/50">
          <div class="grid grid-cols-[1fr_70px_70px_60px] p-3 border-b border-line text-[10px] font-mono uppercase tracking-wider text-slate-400 bg-surface">
            <span>Identity Details</span>
            <span class="text-center">Kills</span>
            <span class="text-center">Deaths</span>
            <span class="text-right">Action</span>
          </div>
          <div id="admin-list" class="divide-y divide-line/40 max-h-[450px] overflow-y-auto">
            <!-- Rows loaded dynamically -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "http://localhost:3000/api";
    const form = document.getElementById("player-form");
    const listContainer = document.getElementById("admin-list");

    async function loadAdminData() {
      try {
        const res = await fetch(`${API_URL}/leaderboard`);
        const players = await res.json();
        listContainer.innerHTML = players.length ? "" : '<div class="p-6 text-center text-xs text-slate-500 uppercase tracking-widest font-mono">No target logs detected</div>';
        
        players.forEach(p => {
          const row = document.createElement("div");
          row.className = "grid grid-cols-[1fr_70px_70px_60px] items-center p-3 text-xs font-mono";
          row.innerHTML = `
            <div class="flex flex-col min-w-0 pr-2">
              <span class="font-sans font-700 text-sm text-white truncate">${p.username}</span>
              <span class="text-[9px] text-slate-500 truncate mt-0.5">${p.uuid || 'NO UUID ASSIGNED'}</span>
            </div>
            <span class="text-center text-lime font-700">${p.kills}</span>
            <span class="text-center text-slate-400">${p.deaths}</span>
            <div class="text-right">
              <button onclick="deletePlayer('${p.username}')" class="text-red-400 hover:text-red-300 font-700 text-[10px] uppercase tracking-wider border border-red-500/20 hover:border-red-500 bg-red-500/5 px-2 py-1 rounded-md transition-all">DEL</button>
            </div>
          `;
          listContainer.appendChild(row);
        });
      } catch (err) {
        console.error("Fetch failure:", err);
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const payload = {
        username: document.getElementById("form-username").value,
        uuid: document.getElementById("form-uuid").value,
        kills: parseInt(document.getElementById("form-kills").value) || 0,
        deaths: parseInt(document.getElementById("form-deaths").value) || 0,
        online: document.getElementById("form-online").checked
      };

      try {
        const res = await fetch(`${API_URL}/admin/players`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          form.reset();
          loadAdminData();
        }
      } catch (err) { alert("Save process configuration error"); }
    });

    window.deletePlayer = async function(username) {
      if (!confirm(`Are you sure you want to completely wipe ${username}'s records?`)) return;
      try {
        const res = await fetch(`${API_URL}/admin/players`, {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username })
        });
        if (res.ok) loadAdminData();
      } catch (err) { alert("Delete signal failed"); }
    };

    loadAdminData();
  </script>
</body>
</html>
